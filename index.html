<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PUMPKIN💕</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #ffc0cb, #ff69b4, #ff1493);
    font-family: 'Comic Sans MS', cursive, sans-serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FLOATING HEARTS */
.heart {
    position: absolute;
    bottom: -50px;
    font-size: 24px;
    color: #fff;
    animation: floatUp 6s linear infinite;
    text-shadow: 0 0 10px #ff69b4,
                 0 0 20px #ff1493;
}

@keyframes floatUp {
    0% {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-110vh) scale(1.5);
        opacity: 0;
    }
}

/* CARD */
.card {
    background: rgba(255, 192, 203, 0.25);
    padding: 40px;
    border-radius: 30px;
    text-align: center;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px #ff69b4,
                0 0 80px #ff1493,
                0 0 120px #ff69b4;
    animation: glow 2s infinite alternate;
    width: 80%;
    max-width: 900px;
    z-index: 2;
}

@keyframes glow {
    from { box-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493; }
    to { box-shadow: 0 0 80px #ff69b4, 0 0 150px #ff1493; }
}

h1 {
    color: white;
    font-size: 3em;
    text-shadow: 0 0 20px #fff,
                 0 0 40px #ff69b4;
}

.song {
    color: white;
    font-size: 1.2em;
    margin-bottom: 15px;
    text-shadow: 0 0 10px #ff69b4;
}

button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 1.2em;
    border: none;
    border-radius: 30px;
    background: #ff69b4;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px #ff1493;
    transition: 0.3s ease;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px #fff;
}

.surprise {
    margin-top: 30px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.surprise img {
    width: 300px;
    border-radius: 20px;
    box-shadow: 0 0 40px #fff,
                0 0 80px #ff69b4;
}

.poem {
    max-width: 300px;
    color: white;
    font-size: 1.2em;
    text-align: left;
    text-shadow: 0 0 10px #ff69b4;
}
</style>
</head>

<body>

<!-- Floating Hearts -->
<script>
for (let i = 0; i < 25; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";
    document.body.appendChild(heart);
}
</script>

<div class="card">
    <h1>LAONE 💕 CHIPANGANE🎃</h1>
    <div class="song"> Please be mine forever🥹</div>

    <button onclick="showSurprise()">Click, Pumpkin 💖</button>

    <div class="surprise" id="surprise">
        <!-- Replace laone.jpg with her real photo -->
        <img src="pumpkin.jpeg" alt="My Beautiful Pumpkin">

        <div class="poem">
            Laone, My love for you is not Fragile 💕<br><br>
            it does not bruise in distance ,<br>
            nor wither with doubt ✨<br><br>
            Every heartbeat whispers your name,<br>
            Every part of me yearns for you.  💗<br><br>
            If butterflies could sing above,<br><br>
            They’d sing Serurubele — the song you made love 💖<br><br>
        </div>
    </div>
</div>

<!-- Optional Music -->
<audio id="bgMusic" src="serurubele.mpeg"></audio>

<script>
function showSurprise() {
    document.getElementById("surprise").style.display = "flex";
    document.getElementById("bgMusic").play();
}
</script>

</body>
</html>
